{% extends 'base.html' %}
{% block title %}Page Not Found - Marvel Safari{% endblock %}
{% block content %}
<section class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-lg animate-slide-up">
    <div class="text-8xl mb-6">🧭</div>
    <h1 class="font-display text-5xl font-bold text-[#003580] mb-3">404</h1>
    <h2 class="text-2xl font-semibold text-gray-800 mb-3">This trail doesn't exist</h2>
    <p class="text-gray-600 mb-8">The page you're looking for may have moved, been removed, or never existed. Let's get you back on track.</p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="{% url 'home' %}" class="btn btn-primary btn-lg">Go home</a>
      <a href="{% url 'properties:search' %}" class="btn btn-secondary btn-lg">Browse stays</a>
    </div>
  </div>
</section>
{% endblock %}
