{% extends 'base.html' %}

{% block title %}Report Review - Marvel Safari{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 py-10">
    <div class="card p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Report Review</h1>
        <p class="text-gray-600 mb-6">Help us keep content accurate and respectful.</p>

        <div class="bg-gray-50 rounded-lg p-4 mb-6">
            <p class="text-sm text-gray-500 mb-1">Review preview</p>
            <p class="text-gray-800">{{ review.comment|truncatechars:220 }}</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-700 mb-1">Reason</label>
                <select name="reason" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
                    <option value="">Select reason</option>
                    <option value="spam">Spam or promotional content</option>
                    <option value="abuse">Abusive or hateful content</option>
                    <option value="fake">Misleading or fake review</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">Details (optional)</label>
                <textarea name="description" rows="4" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Add any extra context"></textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">Submit report</button>
                <a href="{% url 'reviews:review_detail' review.pk %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
