<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ campaign.subject }}</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f4f6;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:10px;overflow:hidden;">
          <tr>
            <td style="background:#003580;color:#ffffff;padding:18px 24px;font-size:22px;font-weight:bold;">
              Marvel Safari Newsletter
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 14px 0;font-size:22px;line-height:1.3;color:#111827;">{{ campaign.title }}</h1>
              <div style="font-size:16px;line-height:1.65;color:#374151;white-space:pre-line;">{{ campaign.body }}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px 24px 24px;font-size:12px;color:#6b7280;line-height:1.5;border-top:1px solid #e5e7eb;">
              You received this email because you subscribed to Marvel Safari updates.<br>
              <a href="{{ unsubscribe_url }}" style="color:#003580;text-decoration:underline;">Unsubscribe</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
