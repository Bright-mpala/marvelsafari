{% extends 'base.html' %}

{% block title %}Create Campaign{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">Create Newsletter Campaign</h1>

    <form method="post" class="bg-white shadow rounded-lg p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            {{ form.title }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
            {{ form.subject }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Body</label>
            {{ form.body }}
        </div>
        <button type="submit" class="px-5 py-2 rounded-lg bg-[#003580] text-white hover:bg-[#00264f]">Save Draft</button>
    </form>
</div>
{% endblock %}
