<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Marvel Safari{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #111827;
      line-height: 1.5;
    }
    .email-wrapper {
      width: 100%;
      padding: 24px 0;
    }
    .email-container {
      max-width: 640px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .email-header {
      background: linear-gradient(135deg, #003580 0%, #001a33 100%);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #e5e7eb;
    }
    .logo-circle {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }
    .email-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .email-subtitle {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .email-body {
      padding: 32px 28px 28px;
      font-size: 15px;
      color: #374151;
    }
    .email-body h1,
    .email-body h2,
    .email-body h3 {
      color: #111827;
    }
    .primary-button {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 999px;
      background-color: #feba02;
      color: #111827 !important;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .meta-text {
      font-size: 13px;
      color: #6b7280;
    }
    .email-footer {
      padding: 18px 24px 6px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .email-footer a {
      color: #4b5563;
      text-decoration: none;
    }
    .email-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-container">
      <div class="email-header">
        <div class="logo-circle" aria-hidden="true">
          <!-- Inline favicon.svg for reliable email rendering -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="28" height="28" role="img" aria-label="Marvel Safari">
            <rect width="64" height="64" rx="14" fill="#003580"/>
            <path d="M16 42 L25 20 L32 33 L39 20 L48 42" fill="none" stroke="#feba02" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="50" cy="17" r="5" fill="#feba02"/>
          </svg>
        </div>
        <div>
          <div class="email-title">Marvel Safari</div>
          <div class="email-subtitle">Your gateway to African adventures</div>
        </div>
      </div>
      <div class="email-body">
        {% block content %}{% endblock %}
      </div>
    </div>
    <div class="email-footer">
      <p>&copy; {% now "Y" %} Marvel Safari. All rights reserved.</p>
      <p class="meta-text">You are receiving this email because you interacted with Marvel Safari.</p>
    </div>
  </div>
</body>
</html>
