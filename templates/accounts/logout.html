{% extends "base_auth.html" %}
{% load static %}

{% block title %}Logout Confirmation - Travel Booking{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center px-4 py-12">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full text-center">
        <!-- Icon -->
        <div class="mb-6 pt-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-gray-900 mb-2">You have logged out</h1>
        <p class="text-gray-600 mb-8">Thank you for using Travel Booking Platform. Your session has been securely closed.</p>

        <!-- Buttons -->
        <div class="space-y-3 pb-8">
            <a href="{% url 'properties:list' %}" class="block w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 rounded-lg hover:shadow-lg transition">
                Back to Home
            </a>
            <a href="{% url 'accounts:login' %}" class="block w-full text-center bg-gray-100 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-200 transition">
                Sign In Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
