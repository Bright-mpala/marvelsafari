{% extends 'base.html' %}

{% block title %}Password Reset Complete - Marvel Safari{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-10 animate-fade-in">

  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-full mb-4">
      <i class="fas fa-check-circle text-3xl text-emerald-600"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Password reset complete!</h1>
    <p class="text-gray-500">Your password has been successfully changed</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="bg-[#003580] px-6 py-3">
      <h2 class="text-white font-semibold"><i class="fas fa-thumbs-up mr-2"></i>Success</h2>
    </div>

    <div class="p-6 space-y-5">
      <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
        <div class="flex items-start">
          <i class="fas fa-shield-alt text-emerald-600 mt-0.5 mr-3"></i>
          <div class="text-sm text-emerald-800">
            <p class="font-medium mb-1">Your account is secure</p>
            <p>You can now sign in with your new password.</p>
          </div>
        </div>
      </div>

      <a href="{% url 'accounts:login' %}" 
         class="block w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-sm text-center">
        <i class="fas fa-sign-in-alt mr-2"></i>Sign In Now
      </a>
    </div>
  </div>

</section>
{% endblock %}
