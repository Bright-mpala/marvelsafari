{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed - Travel Booking{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow-md p-8 text-center">
        <!-- Success Icon -->
        <div class="mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Password Changed Successfully</h1>
        <p class="text-gray-600 mb-8">Your password has been updated. You can now log in with your new password.</p>

        <!-- Button -->
        <a href="{% url 'accounts:dashboard' %}" class="inline-block bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
