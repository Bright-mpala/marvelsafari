<!-- Decision Modal -->
<div id="approvalModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl max-w-lg w-full p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold" id="modalTitle">Approve Booking</h2>
            <button class="text-gray-400 hover:text-gray-600" onclick="closeApprovalModal()">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        
        <form id="approvalForm" method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Decision Notes</label>
                <textarea name="notes" id="modalNotes" rows="4" 
                          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary/20 focus:border-primary transition"
                          placeholder="Add any comments or notes..."></textarea>
                <p class="text-xs text-gray-500 mt-1">Optional: Add context for your decision</p>
            </div>

            <div id="escalationFields" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Escalate To</label>
                <select name="escalate_to" id="escalateTo" 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
                    <option value="">Select an approver</option>
                    {% for approver in approvers %}
                    <option value="{{ approver.user.id }}">{{ approver.user.get_full_name|default:approver.user.email }} ({{ approver.job_title|default:"Approver" }})</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-gray-500 mt-1">Choose who should review this request next</p>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="btn btn-primary flex-1" id="modalActionBtn">Confirm</button>
                <button type="button" class="btn btn-outline flex-1" onclick="closeApprovalModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
// Global functions for modal control
let currentApprovalId = null;
let currentAction = null;

function openApprovalModal(action, approvalId) {
    currentApprovalId = approvalId;
    currentAction = action;
    
    const modal = document.getElementById('approvalModal');
    const title = document.getElementById('modalTitle');
    const form = document.getElementById('approvalForm');
    const escalationFields = document.getElementById('escalationFields');
    const actionBtn = document.getElementById('modalActionBtn');
    const notes = document.getElementById('modalNotes');
    
    // Clear previous values
    notes.value = '';
    if (document.getElementById('escalateTo')) {
        document.getElementById('escalateTo').value = '';
    }
    
    // Configure based on action
    if (action === 'approve') {
        title.textContent = 'Approve Booking';
        form.action = `/business/approvals/${approvalId}/approve/`;
        escalationFields.classList.add('hidden');
        actionBtn.textContent = 'Approve';
        actionBtn.className = 'btn btn-primary flex-1';
        notes.placeholder = 'Add approval notes (optional)...';
        notes.required = false;
    } 
    else if (action === 'reject') {
        title.textContent = 'Reject Booking';
        form.action = `/business/approvals/${approvalId}/reject/`;
        escalationFields.classList.add('hidden');
        actionBtn.textContent = 'Reject';
        actionBtn.className = 'btn btn-danger flex-1';
        notes.placeholder = 'Please provide a reason for rejection...';
        notes.required = true;
    } 
    else if (action === 'escalate') {
        title.textContent = 'Escalate Booking';
        form.action = `/business/approvals/${approvalId}/escalate/`;
        escalationFields.classList.remove('hidden');
        actionBtn.textContent = 'Escalate';
        actionBtn.className = 'btn btn-warning flex-1';
        notes.placeholder = 'Explain why this needs escalation...';
        notes.required = false;
    }
    
    // Show modal
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    
    // Prevent body scrolling
    document.body.style.overflow = 'hidden';
}

function closeApprovalModal() {
    const modal = document.getElementById('approvalModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    
    // Reset form
    document.getElementById('modalNotes').value = '';
    document.getElementById('modalNotes').required = false;
    if (document.getElementById('escalateTo')) {
        document.getElementById('escalateTo').value = '';
    }
    
    // Restore body scrolling
    document.body.style.overflow = 'auto';
}

// Close modal when clicking outside
window.addEventListener('click', function(event) {
    const modal = document.getElementById('approvalModal');
    if (event.target === modal) {
        closeApprovalModal();
    }
});

// Close modal with Escape key
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        const modal = document.getElementById('approvalModal');
        if (!modal.classList.contains('hidden')) {
            closeApprovalModal();
        }
    }
});
</script>

<style>
/* Additional styles for the modal */
.btn-danger {
    background-color: #dc2626;
    color: white;
}
.btn-danger:hover {
    background-color: #b91c1c;
}
.btn-warning {
    background-color: #f59e0b;
    color: white;
}
.btn-warning:hover {
    background-color: #d97706;
}
#approvalModal {
    backdrop-filter: blur(4px);
    transition: all 0.2s;
}
</style>
