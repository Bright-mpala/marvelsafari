{% extends "base.html" %}
{% block title %}Flights Unavailable{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-amber-50 flex items-center justify-center px-4 py-16">
  <div class="card card-hover max-w-2xl w-full">
    <div class="card-body space-y-4 text-center">
      <div class="mx-auto w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center text-amber-600">
        <i class="fa-solid fa-plane-slash text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">Flights are temporarily unavailable</h1>
      <p class="text-gray-600">We're upgrading our flight experience. In the meantime, browse cars, stays, and tours tailored for you.</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a class="btn btn-primary" href="{% url 'car_rentals:car_list' %}">Explore cars</a>
        <a class="btn btn-secondary" href="{% url 'properties:list' %}">Find stays</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
