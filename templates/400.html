{% extends 'base.html' %}
{% block title %}Bad Request - Marvel Safari{% endblock %}
{% block content %}
<section class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-lg animate-slide-up">
    <div class="text-8xl mb-6">⚠️</div>
    <h1 class="font-display text-5xl font-bold text-[#003580] mb-3">400</h1>
    <h2 class="text-2xl font-semibold text-gray-800 mb-3">Bad request</h2>
    <p class="text-gray-600 mb-8">The request you made contains an error or is malformed. Please check your input and try again.</p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="{% url 'home' %}" class="btn btn-primary btn-lg">Go home</a>
      <a href="javascript:history.back()" class="btn btn-secondary btn-lg">Go back</a>
    </div>
  </div>
</section>
{% endblock %}
