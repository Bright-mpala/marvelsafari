{% extends 'base.html' %}
{% block title %}Server Error - Marvel Safari{% endblock %}
{% block content %}
<section class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-lg animate-slide-up">
    <div class="text-8xl mb-6">⚙️</div>
    <h1 class="font-display text-5xl font-bold text-[#003580] mb-3">500</h1>
    <h2 class="text-2xl font-semibold text-gray-800 mb-3">Something went wrong on our end</h2>
    <p class="text-gray-600 mb-8">Our team has been notified. Please try again in a few moments — we're on it.</p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="{% url 'home' %}" class="btn btn-primary btn-lg">Go home</a>
      <a href="javascript:location.reload()" class="btn btn-secondary btn-lg">Try again</a>
    </div>
  </div>
</section>
{% endblock %}
